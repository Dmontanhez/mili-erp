<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
  <div class="max-w-6xl mx-auto px-4 py-8">
    <header class="mb-6">
      <h1 class="text-3xl font-bold text-gray-900">Stock Inventory</h1>
      <p class="text-gray-500 mt-1">Manage your product inventory below.</p>
    </header>

    <main class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="p-4 border-b border-gray-100 flex items-center justify-between">
        <h2 class="text-lg font-semibold">Product List</h2>
        <button
          onclick="loadProducts()"
          class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
        >
          Refresh
        </button>
      </div>

      <div id="loading" class="p-8 text-center text-gray-500">Loading products...</div>

      <div id="table-container" class="hidden overflow-x-auto">
        <table class="min-w-full text-sm text-left">
          <thead class="bg-gray-100 text-gray-600 uppercase font-semibold">
            <tr>
              <th class="px-6 py-3">ID</th>
              <th class="px-6 py-3">Name</th>
              <th class="px-6 py-3">Price</th>
              <th class="px-6 py-3">Category</th>
              <th class="px-6 py-3">Quantity</th>
              <th class="px-6 py-3 text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="product-table-body" class="divide-y divide-gray-100">
            <!-- Rows rendered by JS -->
          </tbody>
        </table>
      </div>

      <div id="empty-state" class="hidden p-8 text-center text-gray-500">
        No products found.
      </div>
    </main>
  </div>

  <!-- Edit Modal -->
  <div
    id="edit-modal"
    class="fixed inset-0 z-50 hidden"
    aria-labelledby="edit-modal-title"
    role="dialog"
    aria-modal="true"
  >
    <div class="fixed inset-0 bg-gray-900/50 transition-opacity" onclick="closeModal()"></div>

    <div class="fixed inset-0 z-10 flex items-center justify-center p-4">
      <div class="w-full max-w-md bg-white rounded-xl shadow-xl">
        <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
          <h3 id="edit-modal-title" class="text-lg font-semibold text-gray-900">Edit Product</h3>
          <button
            onclick="closeModal()"
            class="text-gray-400 hover:text-gray-600 focus:outline-none"
            aria-label="Close"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>

        <form id="edit-form" class="px-6 py-4 space-y-4" onsubmit="saveProduct(event)">
          <input type="hidden" id="edit-id" />

          <div>
            <label for="edit-name" class="block text-sm font-medium text-gray-700">Name</label>
            <input
              type="text"
              id="edit-name"
              name="name"
              required
              class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-3 py-2 border"
            />
          </div>

          <div>
            <label for="edit-price" class="block text-sm font-medium text-gray-700">Price</label>
            <input
              type="number"
              id="edit-price"
              name="price"
              step="0.01"
              min="0"
              required
              class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-3 py-2 border"
            />
          </div>

          <div>
            <label for="edit-category" class="block text-sm font-medium text-gray-700">Category</label>
            <input
              type="text"
              id="edit-category"
              name="category"
              required
              class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-3 py-2 border"
            />
          </div>

          <div>
            <label for="edit-quantity" class="block text-sm font-medium text-gray-700">Quantity</label>
            <input
              type="number"
              id="edit-quantity"
              name="quantity"
              min="0"
              step="1"
              required
              class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm px-3 py-2 border"
            />
          </div>

          <div id="modal-error" class="hidden text-sm text-red-600"></div>

          <div class="pt-2 flex items-center justify-end gap-3">
            <button
              type="button"
              onclick="closeModal()"
              class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
            >
              Cancel
            </button>
            <button
              type="submit"
              id="save-btn"
              class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
            >
              Save
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    const productTableBody = document.getElementById('product-table-body');
    const tableContainer = document.getElementById('table-container');
    const loading = document.getElementById('loading');
    const emptyState = document.getElementById('empty-state');
    const modal = document.getElementById('edit-modal');
    const editForm = document.getElementById('edit-form');
    const modalError = document.getElementById('modal-error');
    const saveBtn = document.getElementById('save-btn');

    document.addEventListener('DOMContentLoaded', loadProducts);

    async function loadProducts() {
      showLoading();
      try {
        const response = await fetch('/products');
        if (!response.ok) throw new Error('Failed to fetch products');
        const products = await response.json();
        renderProducts(products);
      } catch (error) {
        console.error(error);
        loading.textContent = 'Error loading products. Please try again.';
      }
    }

    function showLoading() {
      loading.classList.remove('hidden');
      tableContainer.classList.add('hidden');
      emptyState.classList.add('hidden');
      loading.textContent = 'Loading products...';
    }

    function renderProducts(products) {
      productTableBody.innerHTML = '';

      if (!Array.isArray(products) || products.length === 0) {
        loading.classList.add('hidden');
        tableContainer.classList.add('hidden');
        emptyState.classList.remove('hidden');
        return;
      }

      products.forEach((product) => {
        const row = document.createElement('tr');
        row.className = 'hover:bg-gray-50 transition-colors';
        row.innerHTML = `
          <td class="px-6 py-4 font-medium text-gray-900">${escapeHtml(product.id)}</td>
          <td class="px-6 py-4">${escapeHtml(product.name)}</td>
          <td class="px-6 py-4">${formatPrice(product.price)}</td>
          <td class="px-6 py-4">
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">
              ${escapeHtml(product.category)}
            </span>
          </td>
          <td class="px-6 py-4">${escapeHtml(product.quantity)}</td>
          <td class="px-6 py-4 text-right">
            <button
              onclick="openEditModal(${product.id}, '${escapeJs(product.name)}', ${product.price}, '${escapeJs(product.category)}', ${product.quantity})"
              class="px-3 py-1.5 text-sm font-medium text-blue-700 bg-blue-50 rounded-lg hover:bg-blue-100 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
            >
              Edit
            </button>
          </td>
        `;
        productTableBody.appendChild(row);
      });

      loading.classList.add('hidden');
      emptyState.classList.add('hidden');
      tableContainer.classList.remove('hidden');
    }

    function openEditModal(id, name, price, category, quantity) {
      document.getElementById('edit-id').value = id;
      document.getElementById('edit-name').value = name;
      document.getElementById('edit-price').value = price;
      document.getElementById('edit-category').value = category;
      document.getElementById('edit-quantity').value = quantity;
      modalError.classList.add('hidden');
      modalError.textContent = '';
      modal.classList.remove('hidden');
      document.body.classList.add('overflow-hidden');
      document.getElementById('edit-name').focus();
    }

    function closeModal() {
      modal.classList.add('hidden');
      document.body.classList.remove('overflow-hidden');
      editForm.reset();
      modalError.classList.add('hidden');
      modalError.textContent = '';
    }

    async function saveProduct(event) {
      event.preventDefault();
      modalError.classList.add('hidden');
      modalError.textContent = '';

      const id = document.getElementById('edit-id').value;
      const payload = {
        name: document.getElementById('edit-name').value.trim(),
        price: parseFloat(document.getElementById('edit-price').value),
        category: document.getElementById('edit-category').value.trim(),
        quantity: parseInt(document.getElementById('edit-quantity').value, 10),
      };

      const originalText = saveBtn.textContent;
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';
      saveBtn.classList.add('opacity-75', 'cursor-not-allowed');

      try {
        const response = await fetch(`/update-product/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.message || `Update failed (${response.status})`);
        }

        closeModal();
        await loadProducts();
      } catch (error) {
        console.error(error);
        modalError.textContent = error.message || 'An error occurred while saving.';
        modalError.classList.remove('hidden');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = originalText;
        saveBtn.classList.remove('opacity-75', 'cursor-not-allowed');
      }
    }

    function formatPrice(value) {
      const num = parseFloat(value);
      return Number.isNaN(num) ? escapeHtml(value) : `$${num.toFixed(2)}`;
    }

    function escapeHtml(text) {
      if (text == null) return '';
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeJs(text) {
      if (text == null) return '';
      return String(text)
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'")
        .replace(/"/g, '\\"')
        .replace(/\n/g, '\\n')
        .replace(/\r/g, '\\r');
    }
  </script>
</body>
</html>
