<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILI ERP - Painel do Cliente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        @media print {
            body, html, #app-screen, #auth-screen { margin: 0; padding: 0; background: #fff; }
            body * { visibility: hidden; }
            #print-modal { visibility: visible; position: absolute; left: 0; top: 0; width: 100%; height: auto; z-index: 9999; background: #fff; display: block; overflow: visible; padding: 0; margin: 0; }
            #print-modal .no-print, #print-modal > div > div:first-child, #print-modal > div > div:last-child { display: none !important; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; height: auto; display: flex !important; flex-direction: row !important; justify-content: center !important; align-items: center !important; gap: 8mm !important; background: #fff; padding: 5mm 0 !important; margin: 0 !important; overflow: visible; }
            .label-page { width: 95mm !important; height: 145mm !important; page-break-after: avoid !important; border: 1.5px solid #000 !important; margin: 0 !important; padding: 5mm !important; box-sizing: border-box; background: #fff; display: flex !important; flex-direction: column !important; justify-content: space-between !important; }
            @page { size: A4 landscape; margin: 5mm; }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

    <!-- TELA DE AUTENTICAÇÃO -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center bg-gray-900">
        <div class="bg-white p-8 rounded-lg shadow-lg w-96">
            <div id="login-container">
                <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">MILI ERP - Login</h2>
                <form id="login-form" class="space-y-4" onsubmit="event.preventDefault(); handleLogin();">
                    <input type="email" id="login-email" required class="w-full p-2 border rounded bg-gray-50" placeholder="seu@email.com" />
                    <input type="password" id="login-password" required class="w-full p-2 border rounded bg-gray-50" placeholder="••••••••" />
                    <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 font-semibold transition">Entrar</button>
                </form>
            </div>
        </div>
    </div>

    <!-- TELA DO DASHBOARD -->
    <div id="app-screen" class="hidden min-h-screen flex flex-col">
        <header class="bg-gray-800 text-white p-4 flex justify-between items-center shadow-md">
            <div class="flex items-center space-x-3">
                <span class="text-xl font-bold tracking-wider">MILI ERP</span>
                <span class="bg-blue-600 text-xs px-2 py-1 rounded">Módulo Cliente</span>
            </div>
            <div class="flex items-center space-x-4">
                <span>Olá, <b id="user-display">Usuário</b></span>
                <button onclick="logout()" class="bg-red-600 hover:bg-red-700 text-xs px-3 py-1 rounded transition">Sair</button>
            </div>
        </header>

        <div class="flex flex-1">
            <aside class="w-64 bg-gray-900 text-gray-300 p-4 space-y-2">
                <button onclick="switchTab('dashboard')" id="btn-dashboard" class="w-full text-left p-3 rounded-lg transition bg-blue-600 text-white">Dashboard</button>
                <button onclick="switchTab('estoque')" id="btn-estoque" class="w-full text-left p-3 rounded-lg transition hover:bg-gray-800">Controle de Estoque</button>
                <button onclick="switchTab('vendas')" id="btn-vendas" class="w-full text-left p-3 rounded-lg transition hover:bg-gray-800">Vendas (Mercado Livre)</button>
            </aside>

            <main class="flex-1 p-8 bg-gray-50">
                <!-- DASHBOARD -->
                <div id="tab-dashboard" class="tab-content active space-y-6">
                    <h2 class="text-2xl font-bold text-gray-800">Painel Geral</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-lg shadow border-l-4 border-blue-500">
                            <h3 class="text-gray-500 text-sm font-semibold uppercase">Total de Produtos</h3>
                            <p id="stat-total-products" class="text-3xl font-bold text-gray-800 mt-2">0</p>
                        </div>
                        <div class="bg-white p-6 rounded-lg shadow border-l-4 border-green-500">
                            <h3 class="text-gray-500 text-sm font-semibold uppercase">Estoque Total</h3>
                            <p id="stat-total-stock" class="text-3xl font-bold text-gray-800 mt-2">0 un</p>
                        </div>
                    </div>
                </div>

                <!-- ESTOQUE -->
                <div id="tab-estoque" class="tab-content space-y-6">
                    <h2 class="text-2xl font-bold text-gray-800">Gerenciamento de Estoque</h2>
                    <div class="bg-white rounded-lg shadow overflow-hidden">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">SKU</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nome</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Preço</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Estoque</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="products-table-body" class="bg-white divide-y divide-gray-200"></tbody>
                        </table>
                    </div>
                </div>

                <!-- VENDAS -->
                <div id="tab-vendas" class="tab-content space-y-6">
                    <h2 class="text-2xl font-bold text-gray-800">Vendas do Mercado Livre</h2>
                    <div id="orders-list" class="space-y-4"></div>
                </div>
            </main>
        </div>
    </div>

    <!-- MODAL DE IMPRESSÃO (Mantido) -->
    <div id="print-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg shadow-2xl max-w-5xl w-full p-6 flex flex-col">
            <div id="print-area" class="flex flex-row space-x-8 justify-center">
                <!-- Etiquetas serão injetadas aqui para impressão -->
            </div>
            <div class="flex justify-end space-x-3 mt-4 no-print">
                <button onclick="closePrintModal()" class="bg-gray-500 text-white px-4 py-2 rounded">Fechar</button>
                <button onclick="window.print()" class="bg-blue-600 text-white px-6 py-2 rounded font-bold">Imprimir A4</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://mili-erp-api.onrender.com";
        let currentUser = null;
        let productsList = [];

        function handleLogin() {
            currentUser = { name: "Daniel Montanhez", seller_id: "12345678" };
            document.getElementById("auth-screen").classList.add("hidden");
            document.getElementById("app-screen").classList.remove("hidden");
            document.getElementById("user-display").innerText = currentUser.name;
            loadERPData();
        }

        function switchTab(tab) {
            document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
            document.getElementById(`tab-${tab}`).classList.add("active");
            document.querySelectorAll("aside button").forEach(b => b.classList.remove("bg-blue-600", "text-white"));
            document.getElementById(`btn-${tab}`).classList.add("bg-blue-600", "text-white");
        }

        async function loadERPData() {
            try {
                const res = await fetch(`${API_URL}/products`);
                productsList = await res.json();
                renderProductsTable();
                updateDashboard();
            } catch (err) { console.error("Erro ao carregar dados"); }
        }

        function renderProductsTable() {
            const tbody = document.getElementById("products-table-body");
            tbody.innerHTML = "";
            productsList.forEach(p => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td class="px-6 py-4 text-sm font-medium text-gray-900">${p.sku}</td>
                    <td class="px-6 py-4 text-sm text-gray-500">${p.name}</td>
                    <td class="px-6 py-4 text-sm text-gray-500">R$ ${parseFloat(p.price).toFixed(2)}</td>
                    <td class="px-6 py-4 text-sm font-bold text-gray-900">${p.stock} un</td>
                    <td class="px-6 py-4 text-sm space-x-2">
                        <button onclick="updateStock('${p.sku}', ${p.stock}, 1)" class="bg-gray-200 px-2 py-1 rounded">+</button>
                        <button onclick="updateStock('${p.sku}', ${p.stock}, -1)" class="bg-gray-200 px-2 py-1 rounded">-</button>
                        <button onclick="editStockPrompt('${p.sku}', ${p.stock})" class="bg-blue-100 text-blue-800 px-3 py-1 rounded font-bold">Edit</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function editStockPrompt(sku, currentStock) {
            const newQty = prompt(`Editar estoque para ${sku}:`, currentStock);
            if (newQty === null || newQty === "" || isNaN(newQty)) return;
            await updateStock(sku, 0, parseInt(newQty));
        }

        async function updateStock(sku, currentStock, changeOrAbsolute) {
            const newQty = currentStock === 0 ? changeOrAbsolute : currentStock + changeOrAbsolute;
            if (newQty < 0) return;

            try {
                const res = await fetch(`${API_URL}/products/${sku}/stock`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        quantity: newQty,
                        seller_id: currentUser ? currentUser.seller_id : "123456"
                    })
                });
                if (res.ok) { loadERPData(); }
                else { alert("Erro ao atualizar."); }
            } catch (err) { alert("Erro de conexão."); }
        }

        function updateDashboard() {
            document.getElementById("stat-total-products").innerText = productsList.length;
            document.getElementById("stat-total-stock").innerText = productsList.reduce((acc, p) => acc + p.stock, 0) + " un";
        }

        function logout() { location.reload(); }
        function closePrintModal() { document.getElementById("print-modal").classList.add("hidden"); }
    </script>
</body>
</html>
